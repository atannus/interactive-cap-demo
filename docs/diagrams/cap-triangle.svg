<svg viewBox="0 0 540 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CAP Theorem Triangle">
  <title>CAP Theorem Triangle</title>
  <rect width="540" height="470" fill="#1a1a1a"/>

  <!-- CA edge (left) — systems that ignore P: traditional RDBMS -->
  <line x1="270" y1="72" x2="52" y2="418" stroke="#383838" stroke-width="1.5"/>

  <!-- CP edge (right) — consistency over availability -->
  <line x1="270" y1="72" x2="488" y2="418" stroke="#c82828" stroke-width="2.5" stroke-opacity="0.75"/>

  <!-- AP edge (bottom) — availability over consistency -->
  <line x1="52" y1="418" x2="488" y2="418" stroke="#dc8200" stroke-width="2.5" stroke-opacity="0.75"/>

  <!-- Vertex dots -->
  <circle cx="270" cy="72" r="5" fill="#e8e8e8"/>
  <circle cx="52"  cy="418" r="5" fill="#e8e8e8"/>
  <circle cx="488" cy="418" r="5" fill="#e8e8e8"/>

  <!-- C — Consistency (top) -->
  <text x="270" y="55" text-anchor="middle" fill="#e8e8e8"
        font-family="ui-monospace,Consolas,monospace" font-size="16" font-weight="600" letter-spacing="0.06em">C</text>
  <text x="270" y="38" text-anchor="middle" fill="#606060"
        font-family="system-ui,sans-serif" font-size="11">Consistency</text>

  <!-- A — Availability (bottom-left) -->
  <text x="52" y="444" text-anchor="middle" fill="#e8e8e8"
        font-family="ui-monospace,Consolas,monospace" font-size="16" font-weight="600" letter-spacing="0.06em">A</text>
  <text x="52" y="459" text-anchor="middle" fill="#606060"
        font-family="system-ui,sans-serif" font-size="11">Availability</text>

  <!-- P — Partition Tolerance (bottom-right) -->
  <text x="488" y="444" text-anchor="middle" fill="#e8e8e8"
        font-family="ui-monospace,Consolas,monospace" font-size="16" font-weight="600" letter-spacing="0.06em">P</text>
  <text x="488" y="459" text-anchor="middle" fill="#606060"
        font-family="system-ui,sans-serif" font-size="11">Partition Tolerance</text>

  <!-- CP mode marker — midpoint of CP edge: ((270+488)/2, (72+418)/2) = (379, 245) -->
  <circle cx="379" cy="245" r="8" fill="#c82828" fill-opacity="0.9"/>
  <text x="397" y="241" fill="#c82828"
        font-family="ui-monospace,Consolas,monospace" font-size="12" font-weight="600">CP mode</text>
  <text x="397" y="256" fill="#c82828" fill-opacity="0.7"
        font-family="system-ui,sans-serif" font-size="10">writes rejected</text>

  <!-- AP mode marker — midpoint of AP edge: (270, 418) -->
  <circle cx="270" cy="418" r="8" fill="#dc8200" fill-opacity="0.9"/>
  <text x="288" y="411" fill="#dc8200"
        font-family="ui-monospace,Consolas,monospace" font-size="12" font-weight="600">AP mode</text>
  <text x="288" y="426" fill="#dc8200" fill-opacity="0.7"
        font-family="system-ui,sans-serif" font-size="10">writes diverge</text>

  <!-- Mandatory P note -->
  <text x="270" y="20" text-anchor="middle" fill="#404040"
        font-family="system-ui,sans-serif" font-size="10" letter-spacing="0.04em">
    Real networks partition — the choice is C or A
  </text>
</svg>
