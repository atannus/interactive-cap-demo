<svg viewBox="0 0 780 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sequence diagram: normal write flow">
  <title>Sequence: Normal Write Flow</title>
  <defs>
    <marker id="sq-ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#a0a0a0"/>
    </marker>
    <marker id="sq-ah-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#3db845" fill-opacity="0.85"/>
    </marker>
    <marker id="sq-ah-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,1 L9,5 L0,9 Z" fill="#3178c6" fill-opacity="0.85"/>
    </marker>
  </defs>

  <rect width="780" height="430" fill="#1a1a1a"/>

  <!-- ── Participant boxes ── -->
  <!-- Lane x-centers: Frontend=55, NestJS=180, DB-TS=300, Redis=420, FastAPI=555, DB-PY=700 -->

  <!-- Frontend -->
  <rect x="8"   y="32" width="94" height="26" rx="3" fill="#202020" stroke="#383838"/>
  <text x="55"  y="49" text-anchor="middle" fill="#e8e8e8" font-family="system-ui,sans-serif" font-size="11">Frontend</text>

  <!-- NestJS -->
  <rect x="135" y="32" width="90" height="26" rx="3" fill="#202020" stroke="#3178c6" stroke-opacity="0.6"/>
  <text x="180" y="49" text-anchor="middle" fill="#3178c6" font-family="ui-monospace,Consolas,monospace" font-size="10" font-weight="500">NestJS</text>

  <!-- DB-TS -->
  <rect x="258" y="32" width="84" height="26" rx="3" fill="#202020" stroke="#383838"/>
  <text x="300" y="49" text-anchor="middle" fill="#606060" font-family="ui-monospace,Consolas,monospace" font-size="10">DB-TS</text>

  <!-- Redis -->
  <rect x="380" y="32" width="80" height="26" rx="3" fill="#202020" stroke="#505050"/>
  <text x="420" y="49" text-anchor="middle" fill="#707070" font-family="ui-monospace,Consolas,monospace" font-size="10">Redis</text>

  <!-- FastAPI -->
  <rect x="511" y="32" width="88" height="26" rx="3" fill="#202020" stroke="#3d9bd4" stroke-opacity="0.6"/>
  <text x="555" y="49" text-anchor="middle" fill="#3d9bd4" font-family="ui-monospace,Consolas,monospace" font-size="10" font-weight="500">FastAPI</text>

  <!-- DB-PY -->
  <rect x="658" y="32" width="84" height="26" rx="3" fill="#202020" stroke="#383838"/>
  <text x="700" y="49" text-anchor="middle" fill="#606060" font-family="ui-monospace,Consolas,monospace" font-size="10">DB-PY</text>

  <!-- ── Lifelines ── -->
  <line x1="55"  y1="58" x2="55"  y2="400" stroke="#282828" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="180" y1="58" x2="180" y2="400" stroke="#282828" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="300" y1="58" x2="300" y2="400" stroke="#282828" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="420" y1="58" x2="420" y2="400" stroke="#282828" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="555" y1="58" x2="555" y2="400" stroke="#282828" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="700" y1="58" x2="700" y2="400" stroke="#282828" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── Async boundary ── -->
  <!-- Bracket: steps 1-3 are synchronous (direct response path) -->
  <rect x="0" y="88" width="750" height="108" rx="2" fill="#3db845" fill-opacity="0.03" stroke="#3db845" stroke-opacity="0.08" stroke-width="1"/>
  <text x="757" y="130" fill="#3db845" fill-opacity="0.5" font-family="system-ui,sans-serif" font-size="9" writing-mode="vertical-rl">sync</text>

  <!-- Bracket: steps 4-7 are async replication -->
  <rect x="0" y="208" width="750" height="168" rx="2" fill="#3178c6" fill-opacity="0.03" stroke="#3178c6" stroke-opacity="0.06" stroke-width="1"/>
  <text x="757" y="280" fill="#3178c6" fill-opacity="0.4" font-family="system-ui,sans-serif" font-size="9" writing-mode="vertical-rl">async</text>

  <!-- ── Step 1: Frontend → NestJS: PATCH /position ── -->
  <line x1="57" y1="104" x2="176" y2="104" stroke="#a0a0a0" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#sq-ah)"/>
  <text x="117" y="99" text-anchor="middle" fill="#a0a0a0" fill-opacity="0.7" font-family="system-ui,sans-serif" font-size="10">PATCH /position {x, y}</text>

  <!-- ── Step 2: NestJS → DB-TS: upsert ── -->
  <line x1="182" y1="128" x2="296" y2="128" stroke="#a0a0a0" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#sq-ah)"/>
  <text x="238" y="123" text-anchor="middle" fill="#a0a0a0" fill-opacity="0.5" font-family="system-ui,sans-serif" font-size="10">upsert(x, y)</text>

  <!-- ── Step 3: NestJS → Frontend: WS broadcast (immediate) ── -->
  <line x1="178" y1="168" x2="59" y2="168" stroke="#3db845" stroke-opacity="0.8" stroke-width="1.5" marker-end="url(#sq-ah-g)"/>
  <text x="117" y="163" text-anchor="middle" fill="#3db845" fill-opacity="0.8" font-family="system-ui,sans-serif" font-size="10">WS broadcast</text>
  <text x="117" y="180" text-anchor="middle" fill="#3db845" fill-opacity="0.45" font-family="system-ui,sans-serif" font-size="9">immediate — no Redis round-trip</text>

  <!-- ── Step 4: NestJS → Redis: PUBLISH ── -->
  <line x1="182" y1="224" x2="416" y2="224" stroke="#a0a0a0" stroke-opacity="0.6" stroke-width="1.5" marker-end="url(#sq-ah)"/>
  <text x="298" y="219" text-anchor="middle" fill="#a0a0a0" fill-opacity="0.6" font-family="system-ui,sans-serif" font-size="10">PUBLISH position:replicated</text>

  <!-- ── Step 5: Redis → FastAPI: subscriber receives event ── -->
  <line x1="422" y1="260" x2="551" y2="260" stroke="#a0a0a0" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#sq-ah)"/>
  <text x="486" y="255" text-anchor="middle" fill="#a0a0a0" fill-opacity="0.5" font-family="system-ui,sans-serif" font-size="10">event received</text>

  <!-- ── Step 6: FastAPI → DB-PY: upsert ── -->
  <line x1="557" y1="296" x2="696" y2="296" stroke="#a0a0a0" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#sq-ah)"/>
  <text x="626" y="291" text-anchor="middle" fill="#a0a0a0" fill-opacity="0.5" font-family="system-ui,sans-serif" font-size="10">upsert(x, y)</text>

  <!-- ── Step 7: FastAPI → Frontend: WS broadcast ── -->
  <line x1="553" y1="340" x2="59" y2="340" stroke="#3db845" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#sq-ah-g)"/>
  <text x="304" y="335" text-anchor="middle" fill="#3db845" fill-opacity="0.7" font-family="system-ui,sans-serif" font-size="10">WS broadcast</text>
  <text x="304" y="351" text-anchor="middle" fill="#3db845" fill-opacity="0.4" font-family="system-ui,sans-serif" font-size="9">~1 Redis RTT after step 1</text>

  <!-- Step numbers -->
  <text x="10" y="107" fill="#383838" font-family="ui-monospace,Consolas,monospace" font-size="9">1</text>
  <text x="10" y="131" fill="#383838" font-family="ui-monospace,Consolas,monospace" font-size="9">2</text>
  <text x="10" y="171" fill="#383838" font-family="ui-monospace,Consolas,monospace" font-size="9">3</text>
  <text x="10" y="227" fill="#383838" font-family="ui-monospace,Consolas,monospace" font-size="9">4</text>
  <text x="10" y="263" fill="#383838" font-family="ui-monospace,Consolas,monospace" font-size="9">5</text>
  <text x="10" y="299" fill="#383838" font-family="ui-monospace,Consolas,monospace" font-size="9">6</text>
  <text x="10" y="343" fill="#383838" font-family="ui-monospace,Consolas,monospace" font-size="9">7</text>
</svg>
