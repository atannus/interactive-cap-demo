apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-ts-config
  namespace: edu-oe
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: app
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  PORT: "3001"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-ts
  namespace: edu-oe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-ts
  template:
    metadata:
      labels:
        app: backend-ts
    spec:
      containers:
        - name: backend-ts
          image: edu-oe/backend-ts:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: backend-ts-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: backend-ts
  namespace: edu-oe
  labels:
    app: backend-ts
spec:
  type: LoadBalancer
  selector:
    app: backend-ts
  ports:
    - name: http
      port: 3001
      targetPort: 3001
