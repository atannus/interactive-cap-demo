loki:
  enabled: true
  isDefault: false      # don't override Prometheus as default data source
  persistence:
    enabled: false
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { memory: 256Mi }
  config:
    auth_enabled: false
    ingester:
      chunk_idle_period: 1m
      chunk_retain_period: 30s

promtail:
  enabled: true
  resources:
    requests: { cpu: 20m, memory: 64Mi }
